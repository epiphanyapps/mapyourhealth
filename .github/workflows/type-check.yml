name: Type Check

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

jobs:
  changes:
    name: Detect Changed Packages
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      mobile: ${{ steps.filter.outputs.mobile }}
      admin: ${{ steps.filter.outputs.admin }}
      web: ${{ steps.filter.outputs.web }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            shared: &shared
              - 'package.json'
              - 'yarn.lock'
              - '.yarnrc.yml'
              - '.github/workflows/type-check.yml'
            backend:
              - *shared
              - 'packages/backend/**'
            mobile:
              - *shared
              - 'apps/mobile/**'
              - 'packages/backend/amplify/data/**'
            admin:
              - *shared
              - 'apps/admin/**'
              - 'packages/backend/amplify/data/**'
            web:
              - *shared
              - 'apps/web/**'
              - 'packages/backend/amplify/data/**'

  type-check-backend:
    name: Type Check Backend
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Type check backend
        run: yarn workspace @mapyourhealth/backend compile

  type-check-mobile:
    name: Type Check Mobile
    needs: changes
    if: needs.changes.outputs.mobile == 'true'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ca-central-1

      - name: Generate Amplify outputs
        run: |
          npx ampx generate outputs \
            --branch main \
            --app-id ${{ secrets.AMPLIFY_BACKEND_APP_ID }} \
            --out-dir apps/mobile

      - name: Type check mobile
        run: yarn workspace @mapyourhealth/mobile compile

  type-check-web:
    name: Type Check Web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ca-central-1

      - name: Generate Amplify outputs
        run: |
          npx ampx generate outputs \
            --branch main \
            --app-id ${{ secrets.AMPLIFY_BACKEND_APP_ID }} \
            --out-dir apps/web

      - name: Type check web
        run: yarn workspace @mapyourhealth/web compile

  type-check-admin:
    name: Type Check Admin
    needs: changes
    if: needs.changes.outputs.admin == 'true'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ca-central-1

      - name: Generate Amplify outputs
        run: |
          npx ampx generate outputs \
            --branch main \
            --app-id ${{ secrets.AMPLIFY_BACKEND_APP_ID }} \
            --out-dir apps/admin

      - name: Type check admin (via build)
        run: yarn workspace admin build

  type-check-web:
    name: Type Check Web
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ca-central-1

      - name: Generate Amplify outputs
        run: |
          npx ampx generate outputs \
            --branch main \
            --app-id ${{ secrets.AMPLIFY_BACKEND_APP_ID }} \
            --out-dir apps/web

      - name: Type check web
        run: yarn workspace @mapyourhealth/web compile
