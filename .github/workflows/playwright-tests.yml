name: Playwright Tests

on:
  # pull_request:
  #   branches: [main]
  #   paths:
  #     - 'apps/admin/**'
  #     - '.github/workflows/playwright-tests.yml'
  # push:
  #   branches: [main]
  #   paths:
  #     - 'apps/admin/**'
  #     - '.github/workflows/playwright-tests.yml'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  playwright-tests:
    name: Run Playwright Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ca-central-1

      - name: Generate Amplify outputs
        run: |
          npx ampx generate outputs \
            --branch main \
            --app-id ${{ secrets.AMPLIFY_BACKEND_APP_ID }} \
            --out-dir apps/admin
          cp apps/admin/amplify_outputs.json apps/web/amplify_outputs.json
          cp apps/admin/amplify_outputs.json apps/mobile/amplify_outputs.json
          cp apps/admin/amplify_outputs.json amplify_outputs.json

      - name: Install Playwright Browsers
        working-directory: apps/admin
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests (admin only)
        working-directory: apps/admin
        run: npx playwright test --project=admin-chromium
        env:
          CI: true
          SKIP_MOBILE_SERVER: "true"
          SKIP_WEB_SERVER: "true"
          # AWS credentials for E2E email testing (S3 bucket access)
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_E2E_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_E2E_SECRET_ACCESS_KEY }}
          AWS_REGION: us-east-1
          # Admin credentials for authenticated tests
          ADMIN_EMAIL: ${{ secrets.ADMIN_TEST_EMAIL }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_TEST_PASSWORD }}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: apps/admin/test-results
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/admin/playwright-report
          retention-days: 7
          if-no-files-found: ignore
