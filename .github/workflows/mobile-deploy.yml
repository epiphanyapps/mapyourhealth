name: Mobile Web Deploy

on:
  push:
    branches: [main, staging]
    paths:
      - 'apps/mobile/**'
      - 'packages/backend/amplify/data/**'
      - 'amplify.yml'
      - 'package.json'
      - 'yarn.lock'
  workflow_dispatch:

jobs:
  wait-for-checks:
    name: Wait for Lint and Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Wait for lint workflow
        uses: fountainhead/action-wait-for-check@v1.2.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          checkName: Lint Mobile
          ref: ${{ github.sha }}
          timeoutSeconds: 300
          intervalSeconds: 10

      - name: Wait for type-check workflow
        uses: fountainhead/action-wait-for-check@v1.2.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          checkName: Type Check Mobile
          ref: ${{ github.sha }}
          timeoutSeconds: 300
          intervalSeconds: 10

  detect-changes:
    name: Detect Mobile Changes
    runs-on: ubuntu-latest
    needs: wait-for-checks
    outputs:
      mobile_changed: ${{ steps.changes.outputs.mobile }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for mobile changes
        id: changes
        run: |
          if git diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep -qE '^(apps/mobile/|packages/backend/amplify/data/|amplify\.yml|package\.json|yarn\.lock)'; then
            echo "mobile=true" >> $GITHUB_OUTPUT
          else
            echo "mobile=false" >> $GITHUB_OUTPUT
          fi

  wait-for-backend:
    name: Wait for Backend Deploy
    runs-on: ubuntu-latest
    needs: detect-changes
    if: (needs.detect-changes.outputs.mobile_changed == 'true' || github.event_name == 'workflow_dispatch') && (github.ref_name == 'main' || github.ref_name == 'staging')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if backend changed in this push
        id: backend
        run: |
          BEFORE="${{ github.event.before }}"
          if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            BEFORE="HEAD~1"
          fi
          if git diff --name-only "$BEFORE" "${{ github.sha }}" | grep -qE '^(packages/backend/|amplify/|amplify\.yml|package\.json|yarn\.lock)'; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Configure AWS credentials
        if: steps.backend.outputs.changed == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ca-central-1

      - name: Wait for backend Amplify job to succeed
        if: steps.backend.outputs.changed == 'true'
        run: |
          set -uo pipefail
          APP_ID="${{ secrets.AMPLIFY_BACKEND_APP_ID }}"
          BRANCH="${{ github.ref_name }}"
          SHA="${{ github.sha }}"
          DEADLINE=$(( $(date +%s) + 1800 ))
          while true; do
            if [ "$(date +%s)" -ge "$DEADLINE" ]; then
              echo "Timed out waiting for backend deploy of $SHA"; exit 1
            fi
            JOB=""
            for attempt in 1 2 3; do
              if JOB=$(aws amplify list-jobs --app-id "$APP_ID" --branch-name "$BRANCH" --max-items 20 \
                --query "jobSummaries[?commitId=='$SHA'] | [0]" --output json 2>&1); then
                break
              fi
              echo "list-jobs attempt $attempt failed: $JOB"
              JOB=""
              sleep 5
            done
            if [ -z "$JOB" ]; then
              echo "list-jobs failed 3 times; will retry on next poll"
              sleep 20
              continue
            fi
            STATUS=$(echo "$JOB" | jq -r '.status // empty')
            if [ -z "$STATUS" ]; then
              echo "No backend job for $SHA yet; waiting..."
            else
              echo "Backend job status: $STATUS"
              case "$STATUS" in
                SUCCEED) echo "Backend deployed; proceeding."; exit 0 ;;
                FAILED|CANCELLED) echo "Backend deploy $STATUS; aborting frontend."; exit 1 ;;
              esac
            fi
            sleep 20
          done

  deploy-mobile:
    name: Deploy Mobile Web
    runs-on: ubuntu-latest
    needs: [detect-changes, wait-for-backend]
    if: (needs.detect-changes.outputs.mobile_changed == 'true' || github.event_name == 'workflow_dispatch') && (github.ref_name == 'main' || github.ref_name == 'staging')
    environment:
      name: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ca-central-1

      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Deploy Mobile Web
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%s "${{ github.sha }}")
          COMMIT_TIME=$(git log -1 --pretty=%cI "${{ github.sha }}")
          aws amplify start-job \
            --app-id ${{ secrets.AMPLIFY_MOBILE_APP_ID }} \
            --branch-name ${{ github.ref_name }} \
            --job-type RELEASE \
            --commit-id ${{ github.sha }} \
            --commit-message "$COMMIT_MSG" \
            --commit-time "$COMMIT_TIME"
