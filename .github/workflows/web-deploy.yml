name: Web Landing Page CI/CD

on:
  push:
    branches: [main, staging]
    paths:
      - 'apps/web/**'
      - 'packages/backend/amplify/data/**'
      - 'amplify.yml'
      - 'package.json'
      - 'yarn.lock'
  workflow_dispatch:

# Serialize deploys per branch so back-to-back pushes don't collide on the
# Amplify branch (one PENDING/RUNNING job per branch is the AWS limit).
concurrency:
  group: web-deploy-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  wait-for-checks:
    name: Wait for Lint and Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Wait for lint workflow
        uses: fountainhead/action-wait-for-check@v1.2.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          checkName: Lint Web
          ref: ${{ github.sha }}
          timeoutSeconds: 300
          intervalSeconds: 10

      - name: Wait for type-check workflow
        uses: fountainhead/action-wait-for-check@v1.2.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          checkName: Type Check Web
          ref: ${{ github.sha }}
          timeoutSeconds: 300
          intervalSeconds: 10

  wait-for-backend:
    name: Wait for Backend Deploy
    runs-on: ubuntu-latest
    needs: wait-for-checks
    if: github.ref_name == 'main' || github.ref_name == 'staging'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if backend changed in this push
        id: backend
        run: |
          BEFORE="${{ github.event.before }}"
          if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            BEFORE="HEAD~1"
          fi
          if git diff --name-only "$BEFORE" "${{ github.sha }}" | grep -qE '^(packages/backend/|amplify/|amplify\.yml|package\.json|yarn\.lock)'; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Configure AWS credentials
        if: steps.backend.outputs.changed == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ca-central-1

      - name: Wait for backend Amplify job to succeed
        if: steps.backend.outputs.changed == 'true'
        run: |
          set -uo pipefail
          APP_ID="${{ secrets.AMPLIFY_BACKEND_APP_ID }}"
          BRANCH="${{ github.ref_name }}"
          SHA="${{ github.sha }}"
          DEADLINE=$(( $(date +%s) + 1800 ))
          while true; do
            if [ "$(date +%s)" -ge "$DEADLINE" ]; then
              echo "Timed out waiting for backend deploy of $SHA"; exit 1
            fi
            JOB=""
            for attempt in 1 2 3; do
              if JOB=$(aws amplify list-jobs --app-id "$APP_ID" --branch-name "$BRANCH" --max-items 20 \
                --query "jobSummaries[?commitId=='$SHA'] | [0]" --output json 2>&1); then
                break
              fi
              echo "list-jobs attempt $attempt failed: $JOB"
              JOB=""
              sleep 5
            done
            if [ -z "$JOB" ]; then
              echo "list-jobs failed 3 times; will retry on next poll"
              sleep 20
              continue
            fi
            STATUS=$(echo "$JOB" | jq -r '.status // empty')
            if [ -z "$STATUS" ]; then
              echo "No backend job for $SHA yet; waiting..."
            else
              echo "Backend job status: $STATUS"
              case "$STATUS" in
                SUCCEED) echo "Backend deployed; proceeding."; exit 0 ;;
                FAILED|CANCELLED) echo "Backend deploy $STATUS; aborting frontend."; exit 1 ;;
              esac
            fi
            sleep 20
          done

  web-deploy:
    name: Deploy Web Landing Page
    runs-on: ubuntu-latest
    needs: [wait-for-checks, wait-for-backend]
    environment:
      name: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ca-central-1

      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Deploy Web Landing Page
        run: |
          set -uo pipefail
          APP_ID="${{ secrets.AMPLIFY_WEB_APP_ID }}"
          BRANCH="${{ github.ref_name }}"
          SHA="${{ github.sha }}"
          COMMIT_MSG=$(git log -1 --pretty=%s "$SHA")
          COMMIT_TIME=$(git log -1 --pretty=%cI "$SHA")

          # Amplify allows one PENDING/RUNNING job per branch. Wait for the
          # branch to be free before calling start-job. Surface a clear
          # timeout error rather than falling through to the retry loop.
          DEADLINE=$(( $(date +%s) + 1800 ))
          FREE=0
          while [ "$(date +%s)" -lt "$DEADLINE" ]; do
            if BUSY=$(aws amplify list-jobs --app-id "$APP_ID" --branch-name "$BRANCH" --max-items 5 \
              --query "jobSummaries[?status=='PENDING' || status=='RUNNING'] | length(@)" \
              --output text 2>&1); then
              if [ "$BUSY" = "0" ]; then
                FREE=1
                break
              fi
              echo "Amplify branch $BRANCH busy ($BUSY job(s)); waiting..."
            else
              echo "list-jobs failed: $BUSY"
            fi
            sleep 20
          done
          if [ "$FREE" = "0" ]; then
            echo "Timed out after 30 min waiting for Amplify branch $BRANCH to be free"
            exit 1
          fi

          # Belt-and-suspenders: another caller may have slipped in between
          # the poll and the call. Retry on LimitExceededException.
          for attempt in 1 2 3 4 5; do
            if OUT=$(aws amplify start-job \
              --app-id "$APP_ID" \
              --branch-name "$BRANCH" \
              --job-type RELEASE \
              --commit-id "$SHA" \
              --commit-message "$COMMIT_MSG" \
              --commit-time "$COMMIT_TIME" 2>&1); then
              echo "$OUT"
              exit 0
            fi
            echo "start-job attempt $attempt failed: $OUT"
            if echo "$OUT" | grep -q "LimitExceededException"; then
              sleep 30
              continue
            fi
            exit 1
          done
          echo "start-job exhausted retries"
          exit 1
