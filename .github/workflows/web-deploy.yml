name: Web Landing Page CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'apps/web/**'
      - 'packages/backend/amplify/data/**'
      - 'amplify.yml'
      - 'package.json'
      - 'yarn.lock'
  workflow_dispatch:

jobs:
  wait-for-checks:
    name: Wait for Lint and Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Wait for lint workflow
        uses: fountainhead/action-wait-for-check@v1.2.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          checkName: Lint Web
          ref: ${{ github.sha }}
          timeoutSeconds: 300
          intervalSeconds: 10

      - name: Wait for type-check workflow
        uses: fountainhead/action-wait-for-check@v1.2.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          checkName: Type Check Web
          ref: ${{ github.sha }}
          timeoutSeconds: 300
          intervalSeconds: 10

  web-deploy:
    name: Deploy Web Landing Page
    runs-on: ubuntu-latest
    needs: wait-for-checks
    environment:
      name: production
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ca-central-1

      - name: Deploy Web Landing Page
        run: |
          aws amplify start-job \
            --app-id ${{ secrets.AMPLIFY_WEB_APP_ID }} \
            --branch-name main \
            --job-type RELEASE
