name: Seed Backend Data

on:
  workflow_dispatch:

jobs:
  seed-data:
    name: Seed Data After Backend Deployment
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ca-central-1

      - name: Wait for Amplify deployment to complete
        env:
          AMPLIFY_APP_ID: ${{ secrets.AMPLIFY_BACKEND_APP_ID }}
        run: |
          echo "Waiting for backend deployment to complete..."
          for i in {1..60}; do
            JOB=$(aws amplify list-jobs --app-id $AMPLIFY_APP_ID --branch-name main --max-results 1 --query 'jobSummaries[0]' --output json)
            STATUS=$(echo $JOB | jq -r '.status')
            echo "Attempt $i: Status = $STATUS"
            if [ "$STATUS" = "SUCCEED" ]; then
              echo "Backend deployment succeeded"
              break
            elif [ "$STATUS" = "FAILED" ]; then
              echo "Backend deployment failed"
              exit 1
            elif [ "$STATUS" = "CANCELLED" ] || [ "$STATUS" = "CANCELLING" ]; then
              echo "Backend deployment cancelled"
              exit 1
            fi
            echo "Waiting 30 seconds before next check..."
            sleep 30
          done
          
          echo "Deployment still running after 30 minutes - checking final status..."
          FINAL_JOB=$(aws amplify list-jobs --app-id $AMPLIFY_APP_ID --branch-name main --max-results 1 --query 'jobSummaries[0]' --output json)
          FINAL_STATUS=$(echo $FINAL_JOB | jq -r '.status')
          echo "Final status: $FINAL_STATUS"
          
          if [ "$FINAL_STATUS" != "SUCCEED" ]; then
            echo "Deployment did not complete successfully within 30 minutes"
            exit 1
          fi

      - name: Generate Amplify outputs
        run: |
          npx ampx generate outputs \
            --branch main \
            --app-id ${{ secrets.AMPLIFY_BACKEND_APP_ID }} \
            --out-dir apps/admin

      - name: Run seed script
        env:
          ADMIN_EMAIL: ${{ secrets.SEED_ADMIN_EMAIL }}
          ADMIN_PASSWORD: ${{ secrets.SEED_ADMIN_PASSWORD }}
        run: yarn seed:data
