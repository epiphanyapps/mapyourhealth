name: iOS E2E Tests

# Tiered triggers (see docs/e2e-ci-review-2026-05-16.md + the CI plan):
#   - pull_request touching apps/mobile/** → smoke suite (E2E-100/101/102), ~10 min wall
#   - push to main                          → full suite (every flow under .maestro/flows/), ~30 min wall, informational
#   - workflow_dispatch                     → caller picks the suite via the `suite` input
#
# Path filter keeps non-mobile PRs from spinning up the (~10 min) macOS
# runner. Workflow self-changes (this file) trigger the run too so flips
# to the config don't go untested.
on:
  pull_request:
    branches: [staging, main]
    paths:
      - 'apps/mobile/**'
      - '.github/workflows/e2e-ios.yml'
  push:
    branches: [main]
    paths:
      - 'apps/mobile/**'
      - '.github/workflows/e2e-ios.yml'
  workflow_dispatch:
    inputs:
      suite:
        description: Test suite to run (smoke | core | full)
        required: false
        default: smoke
        type: choice
        options:
          - smoke
          - core
          - full

permissions:
  contents: read
  pull-requests: write

env:
  MAESTRO_DRIVER_STARTUP_TIMEOUT: 240000

jobs:
  ios-e2e:
    name: iOS E2E Tests
    # macos-15 ships Xcode 16+ which RN 0.81.5 requires (the macos-14 runner
    # has Xcode 15.4 and fails pod install with "React Native requires
    # XCode >= 16.1. Found 15.4").
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Java (for Maestro)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            .yarn/cache
            node_modules
            apps/mobile/node_modules
            apps/mobile/ios/Pods
            ~/Library/Caches/CocoaPods
          key: ${{ runner.os }}-deps-${{ hashFiles('**/yarn.lock', '**/Podfile.lock') }}

      - name: Install dependencies
        run: yarn install --immutable

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ca-central-1

      # apps/mobile/app/app.tsx imports `amplify_outputs.json` (prod). The
      # staging file (`amplify_outputs.staging.json`) is checked into git
      # — see the comment in root `.gitignore`. Only the prod file needs
      # to be generated here.
      - name: Generate Amplify outputs (prod)
        run: |
          npx ampx generate outputs \
            --branch main \
            --app-id ${{ secrets.AMPLIFY_BACKEND_APP_ID }} \
            --out-dir apps/mobile

      # `eas build --local` honors .gitignore when packaging the project
      # archive, so the just-generated amplify_outputs.json would be
      # excluded (it's gitignored everywhere). Drop the rule for this
      # CI checkout so EAS includes the file.
      - name: Unignore amplify_outputs.json for EAS pack
        run: sed -i.bak '/^amplify_outputs\.json$/d' .gitignore && rm .gitignore.bak

      - name: Setup EAS CLI
        run: npm install -g eas-cli

      # `eas build --local` for an `ios + simulator: true` profile writes
      # a TARBALL even if --output looks like an .app filename, so simctl
      # install rejects it with "Failed to extract IPA". Output to .tar.gz
      # and extract before installing.
      - name: Build iOS Simulator App
        working-directory: apps/mobile
        run: |
          mkdir -p ./build
          eas build --profile e2e --platform ios --local --non-interactive --output ./build/MapYourHealth.tar.gz
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Extract simulator .app bundle
        working-directory: apps/mobile/build
        run: |
          tar -xzf MapYourHealth.tar.gz
          ls -la
          test -d MapYourHealth.app || (echo "Expected MapYourHealth.app directory after extracting tarball" && exit 1)

      # Pick the first available iPhone simulator regardless of iOS version
      # — macos-14 ships iOS-17 + iPhone 15 Pro, macos-15 ships iOS-18 +
      # iPhone 16 Pro. Hard-coding either breaks across runner upgrades.
      - name: Boot iOS Simulator
        run: |
          xcrun simctl shutdown all 2>/dev/null || true
          DEVICE_ID=$(xcrun simctl list devices available --json | \
            jq -r '[.devices | to_entries[] | select(.key | test("SimRuntime.iOS-")) | .value[] | select(.name | startswith("iPhone"))] | first | .udid')
          if [ -z "$DEVICE_ID" ] || [ "$DEVICE_ID" = "null" ]; then
            echo "No iPhone simulator found. Available runtimes:"
            xcrun simctl list runtimes
            echo "Available devices:"
            xcrun simctl list devices available
            exit 1
          fi
          echo "Booting simulator: $DEVICE_ID"
          xcrun simctl boot "$DEVICE_ID"
          xcrun simctl bootstatus "$DEVICE_ID" -b
          echo "SIMULATOR_UDID=$DEVICE_ID" >> $GITHUB_ENV

      - name: Install Maestro
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      - name: Install app on simulator
        working-directory: apps/mobile
        run: xcrun simctl install booted ./build/MapYourHealth.app

      # Pick the suite glob from the trigger:
      #   pull_request    → smoke (E2E-100/101/102)
      #   push to main    → full (.maestro/flows/)
      #   workflow_dispatch → suite input (smoke | core | full)
      #
      # "smoke" matches `.maestro/flows/E2E-10*.yaml` (per
      # `.maestro/config/test-suites.yaml`). "core" approximates the
      # suite-config "core" set by globbing smoke + E2E-0*; "full" is
      # the whole `.maestro/flows/` directory.
      - name: Determine suite
        id: suite
        run: |
          case "${{ github.event_name }}" in
            pull_request)
              SUITE="smoke"
              ;;
            push)
              SUITE="full"
              ;;
            workflow_dispatch)
              SUITE="${{ inputs.suite }}"
              ;;
            *)
              SUITE="smoke"
              ;;
          esac

          case "$SUITE" in
            smoke)
              GLOB=".maestro/flows/E2E-10*.yaml"
              ;;
            core)
              GLOB=".maestro/flows/E2E-0*.yaml .maestro/flows/E2E-10*.yaml"
              ;;
            full|*)
              GLOB=".maestro/flows"
              ;;
          esac

          echo "suite=$SUITE" >> "$GITHUB_OUTPUT"
          echo "glob=$GLOB" >> "$GITHUB_OUTPUT"
          echo "Running suite: $SUITE → $GLOB"

      - name: Run E2E tests (${{ steps.suite.outputs.suite }})
        working-directory: apps/mobile
        run: |
          $HOME/.maestro/bin/maestro test ${{ steps.suite.outputs.glob }} \
            --env MAESTRO_APP_ID=com.epiphanyapps.mapyourhealth

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-e2e-results-${{ steps.suite.outputs.suite }}
          path: ~/.maestro/tests
          retention-days: 7
          if-no-files-found: ignore
