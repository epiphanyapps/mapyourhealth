# flow: E2E-002 Search Validation
# intent:
#   Validate Google Places autocomplete search functionality.
#   Tests that users can search for cities via Google Places and select from autocomplete.
#
# NOTE: All searches go through Google Places API backend proxy.
# Users must select from autocomplete suggestions.

appId: ${MAESTRO_APP_ID}
---

# Launch app with clean state
- launchApp:
    clearState: true

# Wait for app to load
- waitForAnimationToEnd:
    timeout: 5000

# ========================================
# Test: Google Places Autocomplete Search (Montreal)
# ========================================
# Tests the Google Places autocomplete flow - user types city name,
# gets suggestions from Google Places API, selects one, and the
# location resolves to city/state/country.

- assertVisible:
    text: "Search city or location..."
    label: "Search bar is visible"

- tapOn:
    text: "Search city or location..."
    label: "Tap on search bar"

- inputText: "Montreal"

# Wait for Google Places autocomplete suggestions
- waitForAnimationToEnd:
    timeout: 5000

# Select Montreal from autocomplete (Google Places returns full description)
- tapOn:
    text: ".*Montreal.*QC.*Canada.*"
    index: 0
    label: "Select Montreal from autocomplete"

- waitForAnimationToEnd:
    timeout: 5000

- extendedWaitUntil:
    visible: ".*Montreal.*"
    timeout: 10000

# Verify Montreal location is displayed
- assertVisible:
    text: ".*Montreal.*"
    label: "Montreal location is displayed"

# Montreal may or may not have data - check for either state
- runFlow:
    when:
      visible: "No data for"
    commands:
      - assertVisible:
          text: "Notify Me"
          optional: true
          label: "Notify Me button visible for location without data"
