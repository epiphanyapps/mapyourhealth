# flow: E2E-007 Location Granularity (#62)
# intent:
#   Verify city-level location display (no zip code UI):
#   1. Search by city name via Google Places autocomplete
#   2. Select from suggestions (Enter key alone is not supported)
#   3. Verify city, state display format
#   4. Verify no zip code elements in UI

appId: ${MAESTRO_APP_ID}
onFlowStart:
  - runFlow: ../shared/_OnFlowStart.yaml
---

# ========================================
# Part 1: Verify Search Placeholder Uses City Language
# ========================================
- assertVisible:
    text: "Search city or location..."
    label: "Search placeholder uses city language, not zip code"

- assertNotVisible:
    text: ".*zip.*"
    label: "No zip code references in UI"
    optional: true

# ========================================
# Part 2: Search by City Name (US - Beverly Hills)
# ========================================
- tapOn:
    text: "Search city or.*"
    label: "Tap on search bar"

- inputText: "Beverly Hills"

# Wait for Google Places autocomplete suggestions
- waitForAnimationToEnd:
    timeout: 5000

# Select Beverly Hills from autocomplete suggestions
- tapOn:
    text: ".*Beverly Hills.*CA.*"
    index: 0
    label: "Select Beverly Hills from autocomplete"

- waitForAnimationToEnd
- extendedWaitUntil:
    visible: "Beverly Hills"
    timeout: 10000

# ========================================
# Part 3: Verify City/State Display Format
# ========================================
# Location header should show "City, State" format
- assertVisible:
    text: "Beverly Hills.*CA"
    label: "Location displays in city, state format"

# ========================================
# Part 4: Search for Canadian City (Montreal)
# ========================================
- tapOn:
    text: "Beverly Hills.*CA"
    label: "Tap search bar again"

- inputText: "Montreal"

# Wait for Google Places autocomplete suggestions
- waitForAnimationToEnd:
    timeout: 5000

# Select Montreal from autocomplete suggestions
- tapOn:
    text: ".*Montreal.*QC.*Canada.*"
    index: 0
    label: "Select Montreal from autocomplete"

- waitForAnimationToEnd
- extendedWaitUntil:
    visible: "Montreal"
    timeout: 10000

# Verify Canadian location format
- assertVisible:
    text: "Montreal.*QC"
    label: "Canadian city displays in city, province format"
