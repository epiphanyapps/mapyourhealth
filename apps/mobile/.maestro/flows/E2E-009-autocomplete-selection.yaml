appId: ${MAESTRO_APP_ID}
name: E2E-009 - Autocomplete Selection
tags:
  - e2e
  - search
  - autocomplete
onFlowStart:
  - runFlow: ../shared/_OnFlowStart.yaml
---

# E2E-009: Test Google Places autocomplete search and selection
# Verifies that typing in the search box shows Google Places suggestions
# and tapping a suggestion resolves the location and navigates to dashboard

# Wait for dashboard to load
- waitForAnimationToEnd

# Tap on the search input field (using placeholder text)
- tapOn:
    text: "Search city or location..."
    label: "Tap on search input field"

# Type partial search query
- inputText: "new york"

# Wait for Google Places autocomplete suggestions to appear
- waitForAnimationToEnd:
    timeout: 5000

# Verify a New York suggestion appears from Google Places
# Google Places returns descriptions like "New York, NY, USA"
- assertVisible:
    text: ".*New York.*NY.*"
    label: "New York suggestion is visible"

# Tap on the autocomplete suggestion
- tapOn:
    text: ".*New York.*NY.*"
    index: 0
    label: "Tap on New York suggestion"

# Wait for location resolution and navigation
- waitForAnimationToEnd:
    timeout: 5000

- extendedWaitUntil:
    visible: "New York.*NY"
    timeout: 10000

# Verify we navigated to New York dashboard
- assertVisible:
    text: "New York.*NY"
    label: "Navigated to New York dashboard"

# Verify dashboard content loaded (either data or no-data state)
- runFlow:
    when:
      visible: "No data for"
    commands:
      - assertVisible:
          text: "Notify Me"
          optional: true
          label: "Notify Me shown for location without data"
- runFlow:
    when:
      visible: "Tap Water Quality"
    commands:
      - assertVisible:
          text: "Tap Water Quality.*"
          optional: true
          label: "Safety categories are displayed"
